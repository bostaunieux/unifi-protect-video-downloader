# Create a draft GitHub Release — either by pushing a tag or by running manually from the Actions tab.
# Review the draft on the Releases page, then publish to trigger the Docker image workflow.

name: Create release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # needed for generate_release_notes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm version ${{ inputs.bump }} -m "chore(release): v%s"

      - name: Read version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Push tag and version commit
        if: github.event_name == 'workflow_dispatch'
        run: git push --follow-tags origin HEAD

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && steps.version.outputs.tag_name || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
